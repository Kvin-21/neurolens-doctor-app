name: neurolens_doctor
description: NeuroLens Doctor Portal - Desktop application for monitoring dementia patients
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  fl_chart: ^0.66.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  intl: ^0.18.1
  window_manager: ^0.3.7
  uuid: ^4.2.1
  path_provider: ^2.1.1
  # Backend connectivity and result decryption
  dio: ^5.4.3
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
